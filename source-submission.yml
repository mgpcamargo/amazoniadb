name: Source submission to draft PR

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  build-pr:
    if: contains(github.event.issue.labels.*.name, 'new-source')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse issue form
        id: issue-parser
        uses: stefanbuck/github-issue-parser@v3
        with:
          issue-body: ${{ github.event.issue.body }}
          template-path: .github/ISSUE_TEMPLATE/new-source.yml

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build catalog entry
        id: build-entry
        env:
          ISSUEFORM_JSON: ${{ steps.issue-parser.outputs.jsonString }}
        run: node scripts/issue-to-entry.mjs

      - name: Validate catalog
        run: node scripts/validate-catalog.mjs

      - name: Open draft pull request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "Add source: ${{ steps.build-entry.outputs.title }}"
          branch: "source-issue-${{ github.event.issue.number }}"
          title: "New source: ${{ steps.build-entry.outputs.title }}"
          body: |
            Auto-generated from #${{ github.event.issue.number }} by the source-submission workflow.

            This has passed schema validation (`scripts/validate-catalog.mjs`) but **not** editorial review — check the category, access note, and description against CONTRIBUTING.md before merging.
          draft: true
          labels: |
            new-source
            needs-review

      - name: Link PR on the issue
        if: steps.cpr.outputs.pull-request-number
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Opened draft PR #${{ steps.cpr.outputs.pull-request-number }} for review — thanks for the submission!"
            });

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "Thanks for the submission — an automated check didn't pass, so no PR was opened yet. This usually means a required field was left blank or a dropdown answer didn't match exactly. A maintainer will take a look."
            });
