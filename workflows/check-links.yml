name: Check catalog links

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check links
        id: links
        run: node scripts/check-links.mjs

      - name: Find existing broken-links issue
        id: existing
        if: steps.links.outputs.broken_count != '0'
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "broken-links"
            });
            return issues.data.length ? String(issues.data[0].number) : "";

      - name: Open new issue
        if: steps.links.outputs.broken_count != '0' && steps.existing.outputs.result == ''
        uses: actions/github-script@v7
        env:
          BROKEN_BODY: ${{ steps.links.outputs.broken_body }}
          BROKEN_COUNT: ${{ steps.links.outputs.broken_count }}
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Broken link check: ${process.env.BROKEN_COUNT} source(s) failing`,
              labels: ["broken-links"],
              body: `Automated weekly check found link(s) returning errors. Some sites block automated checks even when they work fine for real visitors — verify by hand before removing anything.\n\n${process.env.BROKEN_BODY}`
            });

      - name: Update existing issue
        if: steps.links.outputs.broken_count != '0' && steps.existing.outputs.result != ''
        uses: actions/github-script@v7
        env:
          BROKEN_BODY: ${{ steps.links.outputs.broken_body }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.result }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `Re-checked — still failing:\n\n${process.env.BROKEN_BODY}`
            });
