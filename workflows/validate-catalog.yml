name: Validate catalog

on:
  pull_request:
    paths:
      - "data/catalog.js"
      - "data/catalog.schema.json"
      - "scripts/validate-catalog.mjs"
  push:
    branches: [main]
    paths:
      - "data/catalog.js"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate-catalog.mjs
