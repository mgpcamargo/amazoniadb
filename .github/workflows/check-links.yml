name: Check catalog links

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check links
        id: links
        run: node scripts/check-links.mjs

      - name: Find existing maintenance issue
        id: existing
        if: steps.links.outputs.broken_count != '0' || steps.links.outputs.stale_count != '0'
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "broken-links"
            });
            return issues.data.length ? String(issues.data[0].number) : "";

      - name: Open new issue
        if: (steps.links.outputs.broken_count != '0' || steps.links.outputs.stale_count != '0') && steps.existing.outputs.result == ''
        uses: actions/github-script@v7
        env:
          BROKEN_BODY: ${{ steps.links.outputs.broken_body }}
          BROKEN_COUNT: ${{ steps.links.outputs.broken_count }}
          STALE_BODY: ${{ steps.links.outputs.stale_body }}
          STALE_COUNT: ${{ steps.links.outputs.stale_count }}
        with:
          script: |
            const brokenCount = Number(process.env.BROKEN_COUNT);
            const staleCount = Number(process.env.STALE_COUNT);
            const sections = [];
            if (brokenCount > 0) sections.push(`### Broken links (${brokenCount})\n\nSome sites block automated checks even when they work fine for real visitors — verify by hand before removing anything.\n\n${process.env.BROKEN_BODY}`);
            if (staleCount > 0) sections.push(`### Unverified for 180+ days (${staleCount})\n\nThese still passed their last link check — this is a nudge to re-review, not a claim that anything is wrong.\n\n${process.env.STALE_BODY}`);
            const titleParts = [];
            if (brokenCount > 0) titleParts.push(`${brokenCount} broken`);
            if (staleCount > 0) titleParts.push(`${staleCount} stale`);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly catalog check: ${titleParts.join(", ")}`,
              labels: ["broken-links"],
              body: `Automated weekly check of the catalog.\n\n${sections.join("\n\n")}`
            });

      - name: Update existing issue
        if: (steps.links.outputs.broken_count != '0' || steps.links.outputs.stale_count != '0') && steps.existing.outputs.result != ''
        uses: actions/github-script@v7
        env:
          BROKEN_BODY: ${{ steps.links.outputs.broken_body }}
          BROKEN_COUNT: ${{ steps.links.outputs.broken_count }}
          STALE_BODY: ${{ steps.links.outputs.stale_body }}
          STALE_COUNT: ${{ steps.links.outputs.stale_count }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.result }}
        with:
          script: |
            const brokenCount = Number(process.env.BROKEN_COUNT);
            const staleCount = Number(process.env.STALE_COUNT);
            const sections = [];
            if (brokenCount > 0) sections.push(`### Broken links (${brokenCount})\n\n${process.env.BROKEN_BODY}`);
            if (staleCount > 0) sections.push(`### Unverified for 180+ days (${staleCount})\n\n${process.env.STALE_BODY}`);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: `Re-checked:\n\n${sections.join("\n\n")}`
            });
