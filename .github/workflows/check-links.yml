name: Check catalog links

on:
  schedule:
    - cron: "0 6 * * 1"  # every Monday, 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check links
        id: links
        run: node scripts/check-links.mjs

      - name: Find existing catalog-health issue
        id: existing
        if: steps.links.outputs.broken_count != '0' || steps.links.outputs.stale_count != '0'
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "broken-links"
            });
            return issues.data.length ? String(issues.data[0].number) : "";

      - name: Open new issue
        if: (steps.links.outputs.broken_count != '0' || steps.links.outputs.stale_count != '0') && steps.existing.outputs.result == ''
        uses: actions/github-script@v7
        env:
          BROKEN_BODY: ${{ steps.links.outputs.broken_body }}
          BROKEN_COUNT: ${{ steps.links.outputs.broken_count }}
          STALE_BODY: ${{ steps.links.outputs.stale_body }}
          STALE_COUNT: ${{ steps.links.outputs.stale_count }}
        with:
          script: |
            const brokenCount = Number(process.env.BROKEN_COUNT);
            const staleCount = Number(process.env.STALE_COUNT);
            const titleParts = [];
            if (brokenCount) titleParts.push(`${brokenCount} broken link${brokenCount === 1 ? "" : "s"}`);
            if (staleCount) titleParts.push(`${staleCount} stale entr${staleCount === 1 ? "y" : "ies"}`);
            const bodyParts = [];
            if (brokenCount) {
              bodyParts.push(`**Broken links** — some sites block automated checks even when they work fine for real visitors; verify by hand before removing anything.\n\n${process.env.BROKEN_BODY}`);
            }
            if (staleCount) {
              bodyParts.push(`**Stale entries** — not yet checked again in a while. Worth a quick revisit to confirm the link, access terms, and description still hold.\n\n${process.env.STALE_BODY}`);
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Catalog health check: ${titleParts.join(", ")}`,
              labels: ["broken-links"],
              body: bodyParts.join("\n\n---\n\n")
            });

      - name: Update existing issue
        if: (steps.links.outputs.broken_count != '0' || steps.links.outputs.stale_count != '0') && steps.existing.outputs.result != ''
        uses: actions/github-script@v7
        env:
          BROKEN_BODY: ${{ steps.links.outputs.broken_body }}
          BROKEN_COUNT: ${{ steps.links.outputs.broken_count }}
          STALE_BODY: ${{ steps.links.outputs.stale_body }}
          STALE_COUNT: ${{ steps.links.outputs.stale_count }}
          ISSUE_NUMBER: ${{ steps.existing.outputs.result }}
        with:
          script: |
            const brokenCount = Number(process.env.BROKEN_COUNT);
            const staleCount = Number(process.env.STALE_COUNT);
            const bodyParts = ["Re-checked:"];
            if (brokenCount) bodyParts.push(`**Broken links**\n\n${process.env.BROKEN_BODY}`);
            if (staleCount) bodyParts.push(`**Stale entries**\n\n${process.env.STALE_BODY}`);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              body: bodyParts.join("\n\n---\n\n")
            });
