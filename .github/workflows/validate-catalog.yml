name: Validate catalog

on:
  pull_request:
    paths:
      - "data/catalog.js"
      - "data/catalog.schema.json"
      - "scripts/validate-catalog.mjs"
  push:
    branches: [main]
    paths:
      - "data/catalog.js"
      - "data/catalog.schema.json"
      - "scripts/validate-catalog.mjs"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: node scripts/validate-catalog.mjs

      - name: Regenerate public API mirror
        if: github.event_name == 'push'
        run: node scripts/build-api.mjs

      - name: Commit API mirror if changed
        if: github.event_name == 'push'
        run: |
          if ! git diff --quiet -- api/catalog.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add api/catalog.json
            git commit -m "Regenerate api/catalog.json [skip ci]"
            git push
          fi
